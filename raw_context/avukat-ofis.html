// TAB BAR
const TabBar=({tabs,activeTab,onTabChange,onTabClose,theme})=>{
  const bg=theme==='dark'?'bg-gray-900 border-gray-700':'bg-gray-100 border-gray-300';
  return(
    <div className={`h-9 flex items-end px-1 gap-0.5 border-b overflow-x-auto ${bg}`}>
      {tabs.map(tab=>(
        <div key={tab.id} className={`group flex items-center gap-2 px-3 py-1.5 rounded-t cursor-pointer transition-colors min-w-[120px] max-w-[200px] ${
          activeTab===tab.id?theme==='dark'?'bg-gray-800 text-white border-t-2 border-x border-t-violet-500 border-x-gray-700':'bg-white text-gray-900 border-t-2 border-x border-t-violet-500 border-x-gray-300'
          :theme==='dark'?'text-gray-400 hover:bg-gray-800/50':'text-gray-600 hover:bg-gray-50'}`}
          onClick={()=>onTabChange(tab.id)}>
          {tab.icon&&<Icon name={tab.icon} size={14}/>}
          <span className="text-sm truncate flex-1">{tab.label}</span>
          {tab.closable!==false&&<button className={`p-0.5 rounded opacity-0 group-hover:opacity-100 transition-opacity ${theme==='dark'?'hover:bg-gray-600':'hover:bg-gray-200'}`}
            onClick={e=>{e.stopPropagation();onTabClose(tab.id)}}><Icon name="X" size={12}/></button>}
        </div>
      ))}
    </div>
  );
};

// CONTEXT MENU
const ContextMenu=({x,y,items,onClose,theme})=>{
  useEffect(()=>{const h=()=>onClose();document.addEventListener('click',h);return()=>document.removeEventListener('click',h)},[onClose]);
  const bg=theme==='dark'?'bg-gray-800 border border-gray-700':'bg-white border border-gray-200';
  return(
    <div className={`fixed py-1 min-w-[180px] rounded-md shadow-xl z-[100] ${bg}`} style={{left:x,top:y}}>
      {items.map((item,i)=>item.type==='separator'?
        <div key={i} className={`my-1 border-t ${theme==='dark'?'border-gray-700':'border-gray-200'}`}/>:
        <button key={i} className={`w-full px-3 py-1.5 text-sm text-left flex items-center gap-2 ${item.disabled?theme==='dark'?'text-gray-600':'text-gray-400':theme==='dark'?'text-gray-300 hover:bg-gray-700':'text-gray-700 hover:bg-gray-100'}`}
          onClick={()=>!item.disabled&&item.action?.()} disabled={item.disabled}>
          {item.icon&&<Icon name={item.icon} size={14}/>}<span className="flex-1">{item.label}</span>
          {item.shortcut&&<span className={`text-xs ${theme==='dark'?'text-gray-500':'text-gray-400'}`}>{item.shortcut}</span>}
        </button>
      )}
    </div>
  );
};

  const sorted=useMemo(()=>{
    if(!sortCfg.key)return data;
    return[...data].sort((a,b)=>{if(a[sortCfg.key]<b[sortCfg.key])return sortCfg.dir==='asc'?-1:1;if(a[sortCfg.key]>b[sortCfg.key])return sortCfg.dir==='asc'?1:-1;return 0});
  },[data,sortCfg]);
  const hBg=theme==='dark'?'bg-gray-800':'bg-gray-100';
  const bdr=theme==='dark'?'border-gray-700':'border-gray-300';
  return(
    <div className="flex-1 overflow-auto">
      <table className="w-full border-collapse text-sm">
        <thead className={`sticky top-0 ${hBg}`}>
          <tr>
            <th className={`w-8 p-2 border-b ${bdr}`}><input type="checkbox" className="rounded"/></th>
            {columns.map(col=>(
              <th key={col.key} className={`p-2 text-left border-b cursor-pointer select-none ${bdr} ${theme==='dark'?'hover:bg-gray-700':'hover:bg-gray-200'}`}
                style={{width:col.width}} onClick={()=>setSortCfg(p=>({key:col.key,dir:p.key===col.key&&p.dir==='asc'?'desc':'asc'}))}>
                <div className="flex items-center gap-1">
                  <span className={theme==='dark'?'text-gray-300':'text-gray-700'}>{col.label}</span>
                  {sortCfg.key===col.key&&<Icon name={sortCfg.dir==='asc'?'ChevronUp':'ChevronDown'} size={12}/>}
                </div>
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {sorted.map((row,idx)=>(
            <tr key={row.id} className={`cursor-pointer transition-colors ${
              selectedRows.includes(row.id)?theme==='dark'?'bg-violet-900/20':'bg-violet-50'
              :idx%2===0?theme==='dark'?'bg-gray-900':'bg-white':theme==='dark'?'bg-gray-800/50':'bg-gray-50'
            } ${theme==='dark'?'hover:bg-gray-700':'hover:bg-gray-100'}`}
              onClick={()=>onRowSelect?.(row.id)} onDoubleClick={()=>onRowDoubleClick?.(row)}
              onContextMenu={e=>{e.preventDefault();onContextMenu?.(e,row)}}>
              <td className={`p-2 border-b ${theme==='dark'?'border-gray-800':'border-gray-200'}`}>
                <input type="checkbox" checked={selectedRows.includes(row.id)} onChange={()=>{}} className="rounded"/>
              </td>
              {columns.map(col=>(
                <td key={col.key} className={`p-2 border-b ${theme==='dark'?'border-gray-800 text-gray-300':'border-gray-200 text-gray-700'}`}>
                  {col.render?col.render(row[col.key],row,theme):row[col.key]}
                </td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
};

const DosyaListeScreen=({theme,onOpenDosya})=>{
  const[filters,setFilters]=useState({search:'',tur:'',durum:''});
  const[selRows,setSelRows]=useState([]);
  const[ctx,setCtx]=useState(null);
  const cols=[
    {key:'dosyaNo',label:'Dosya No',width:'110px',render:v=><span className="font-mono text-xs">{v}</span>},
    {key:'esas',label:'Esas No',width:'100px',render:v=><span className="font-mono text-xs">{v}</span>},
    {key:'mahkeme',label:'Mahkeme',width:'200px'},
    {key:'muvekkil',label:'Müvekkil',width:'150px',render:v=><span className="font-medium">{v}</span>},
    {key:'konu',label:'Konu',width:'150px'},
    {key:'tur',label:'Tür',width:'80px',render:(v,r,t)=>{
      const c={Hukuk:'blue',İş:'amber',Aile:'pink',Ceza:'red',İcra:'orange',Ticaret:'emerald',İdare:'violet'}[v]||'gray';
      return <span className="px-2 py-0.5 rounded text-xs" style={t==='dark'?{background:`rgba(139,92,246,0.15)`,color:'#a78bfa'}:{background:'#f3e8ff',color:'#7c3aed'}}>{v}</span>;
    }},
    {key:'durum',label:'Durum',width:'120px',render:(v,r,t)=><span className={`px-2 py-0.5 rounded text-xs ${v==='Devam Ediyor'?t==='dark'?'bg-blue-900/30 text-blue-400':'bg-blue-100 text-blue-700':t==='dark'?'bg-emerald-900/30 text-emerald-400':'bg-emerald-100 text-emerald-700'}`}>{v}</span>},
    {key:'avukat',label:'Avukat',width:'130px'},
  ];
  const fd=mockDos.filter(r=>{
    if(filters.search&&!r.dosyaNo.toLowerCase().includes(filters.search.toLowerCase())&&!r.muvekkil.toLowerCase().includes(filters.search.toLowerCase())&&!r.konu.toLowerCase().includes(filters.search.toLowerCase()))return false;
    if(filters.tur&&r.tur!==filters.tur)return false;
    if(filters.durum&&r.durum!==filters.durum)return false;
    return true;
  });
  return(
    <div className="flex-1 flex flex-col">
      <QuickFilter filters={filters} onFilterChange={setFilters} theme={theme}
        filterOptions={[{key:'tur',allLabel:'Tüm Türler',options:['Hukuk','İş','Aile','Ceza','İcra','Ticaret','İdare']},{key:'durum',allLabel:'Tüm Durumlar',options:['Devam Ediyor','Sonuçlandı']}]}/>
      <DataGrid columns={cols} data={fd} selectedRows={selRows}
        onRowSelect={id=>setSelRows(p=>p.includes(id)?p.filter(r=>r!==id):[...p,id])}
        onRowDoubleClick={row=>onOpenDosya?.(row)} theme={theme}
        onContextMenu={(e,row)=>setCtx({x:e.clientX,y:e.clientY,items:[
          {label:'Dosyayı Aç',icon:'Eye',action:()=>onOpenDosya?.(row)},
          {label:'Düzenle',icon:'Edit'},{type:'separator'},
          {label:'Görev Ekle',icon:'PlusCircle'},{label:'Belge Ekle',icon:'Paperclip'},
          {type:'separator'},{label:'Sil',icon:'Trash2',disabled:true},
        ]})}/>
      <div className={`h-8 flex items-center justify-between px-3 border-t text-xs ${theme==='dark'?'bg-gray-800 border-gray-700 text-gray-400':'bg-gray-100 border-gray-300 text-gray-600'}`}>
        <span>{fd.length} dosya ({selRows.length} seçili)</span>
        <span>Devam Eden: {fd.filter(r=>r.durum==='Devam Ediyor').length} | Sonuçlanan: {fd.filter(r=>r.durum==='Sonuçlandı').length}</span>
      </div>
      {ctx&&<ContextMenu {...ctx} onClose={()=>setCtx(null)} theme={theme}/>}
    </div>
  );
};

        onRowSelect={id=>setSelRows(p=>p.includes(id)?p.filter(r=>r!==id):[...p,id])} theme={theme}/>
      <div className={`h-8 flex items-center justify-between px-3 border-t text-xs ${theme==='dark'?'bg-gray-800 border-gray-700 text-gray-400':'bg-gray-100 border-gray-300 text-gray-600'}`}>
        <span>{fd.length} görev</span>
        <span>Acil: {fd.filter(g=>g.oncelik==='Acil').length} | Tamamlanan: {fd.filter(g=>g.durum==='Tamamlandı').length}</span>
      </div>
    </div>
  );
};

// MALİ TAKİP
const MaliTakipScreen=({theme})=>{
  const[filters,setFilters]=useState({search:'',tip:'',durum:''});
  const[selRows,setSelRows]=useState([]);
  const cols=[
    {key:'tarih',label:'Tarih',width:'100px',render:v=>fmtD(v)},
    {key:'muvekkil',label:'Müvekkil',width:'160px',render:v=><span className="font-medium">{v}</span>},
    {key:'dosyaNo',label:'Dosya No',width:'110px',render:v=><span className="font-mono text-xs">{v}</span>},
    {key:'aciklama',label:'Açıklama',width:'200px'},
    {key:'tip',label:'Tip',width:'80px',render:(v,r,t)=><span className={`px-2 py-0.5 rounded text-xs ${v==='Alacak'?t==='dark'?'bg-emerald-900/30 text-emerald-400':'bg-emerald-100 text-emerald-700':t==='dark'?'bg-rose-900/30 text-rose-400':'bg-rose-100 text-rose-700'}`}>{v}</span>},
    {key:'tutar',label:'Tutar',width:'120px',render:(v,r)=><span className={`font-medium ${r.tip==='Alacak'?'text-emerald-500':'text-rose-500'}`}>{fmt(v)}</span>},
    {key:'durum',label:'Durum',width:'110px',render:(v,r,t)=>{
      const s={'Tahsil Edildi':{l:'bg-emerald-100 text-emerald-700',d:'bg-emerald-900/30 text-emerald-400'},Ödendi:{l:'bg-emerald-100 text-emerald-700',d:'bg-emerald-900/30 text-emerald-400'},'Kısmi Ödendi':{l:'bg-amber-100 text-amber-700',d:'bg-amber-900/30 text-amber-400'},Bekliyor:{l:'bg-gray-100 text-gray-600',d:'bg-gray-700 text-gray-400'}}[v]||{l:'bg-gray-100',d:'bg-gray-700'};
      return <span className={`px-2 py-0.5 rounded text-xs ${t==='dark'?s.d:s.l}`}>{v}</span>;
    }},
  ];
  const fd=mockMali.filter(r=>{
    if(filters.search&&!r.aciklama.toLowerCase().includes(filters.search.toLowerCase())&&!r.muvekkil.toLowerCase().includes(filters.search.toLowerCase()))return false;
    if(filters.tip&&r.tip!==filters.tip)return false;
    if(filters.durum&&r.durum!==filters.durum)return false;
    return true;
  });
  const tA=fd.filter(m=>m.tip==='Alacak').reduce((a,b)=>a+b.tutar,0);
  const tB=fd.filter(m=>m.tip==='Borç').reduce((a,b)=>a+b.tutar,0);
  return(
    <div className="flex-1 flex flex-col">
      <QuickFilter filters={filters} onFilterChange={setFilters} theme={theme}
        filterOptions={[{key:'tip',allLabel:'Tüm Tipler',options:['Alacak','Borç']},{key:'durum',allLabel:'Tüm Durumlar',options:['Bekliyor','Tahsil Edildi','Ödendi','Kısmi Ödendi']}]}/>
      <DataGrid columns={cols} data={fd} selectedRows={selRows}
        onRowSelect={id=>setSelRows(p=>p.includes(id)?p.filter(r=>r!==id):[...p,id])} theme={theme}/>
      <div className={`h-8 flex items-center justify-between px-3 border-t text-xs ${theme==='dark'?'bg-gray-800 border-gray-700 text-gray-400':'bg-gray-100 border-gray-300 text-gray-600'}`}>
        <span>{fd.length} kayıt</span>
        <div className="flex items-center gap-4">
          <span>Alacak: <strong className="text-emerald-500">{fmt(tA)}</strong></span>
          <span>Borç: <strong className="text-rose-500">{fmt(tB)}</strong></span>
          <span>Net: <strong className={tA-tB>=0?'text-emerald-500':'text-rose-500'}>{fmt(tA-tB)}</strong></span>
        </div>
      </div>
    </div>
  );
};

// KULLANICI YÖNETİMİ
const KullaniciYonetimiScreen=({theme})=>{
  const[selUser,setSelUser]=useState(null);
  const inp=theme==='dark'?'bg-gray-800 border-gray-700 text-white':'bg-white border-gray-300 text-gray-900';
  const rolC={Yönetici:theme==='dark'?'bg-violet-900/30 text-violet-400':'bg-violet-100 text-violet-700',Avukat:theme==='dark'?'bg-blue-900/30 text-blue-400':'bg-blue-100 text-blue-700',Stajyer:theme==='dark'?'bg-amber-900/30 text-amber-400':'bg-amber-100 text-amber-700',Sekreter:theme==='dark'?'bg-emerald-900/30 text-emerald-400':'bg-emerald-100 text-emerald-700'};
  const yetkiler=[{modul:'Müvekkil Yönetimi',y:true,a:true,s:true,sk:true},{modul:'Dosya/Dava Yönetimi',y:true,a:true,s:true,sk:false},{modul:'Mali Takip',y:true,a:true,s:false,sk:false},{modul:'Raporlama',y:true,a:true,s:false,sk:false},{modul:'Kullanıcı Yönetimi',y:true,a:false,s:false,sk:false},{modul:'Görev Yönetimi',y:true,a:true,s:true,sk:true}];
  return(
    <div className="flex-1 flex">
      <div className={`w-80 border-r flex flex-col ${theme==='dark'?'bg-gray-800/50 border-gray-700':'bg-gray-50 border-gray-200'}`}>
        <div className={`p-3 border-b ${theme==='dark'?'border-gray-700':'border-gray-200'}`}>
          <h3 className={`font-semibold ${theme==='dark'?'text-white':'text-gray-900'}`}>Kullanıcılar</h3>
        </div>
        <div className="flex-1 overflow-auto">
          {mockKul.map(u=>(
            <div key={u.id} onClick={()=>setSelUser(u)} className={`p-3 border-b cursor-pointer transition-colors ${selUser?.id===u.id?theme==='dark'?'bg-violet-900/20 border-gray-700':'bg-violet-50 border-gray-200':theme==='dark'?'border-gray-700 hover:bg-gray-700':'border-gray-200 hover:bg-gray-100'}`}>
              <div className="flex items-center gap-3">
                <div className={`w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold ${theme==='dark'?'bg-violet-900/30 text-violet-400':'bg-violet-100 text-violet-600'}`}>{u.ad.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
                <div className="flex-1 min-w-0">
                  <p className={`text-sm font-medium truncate ${theme==='dark'?'text-gray-200':'text-gray-800'}`}>{u.ad}</p>
                  <p className={`text-xs ${theme==='dark'?'text-gray-500':'text-gray-400'}`}>{u.email}</p>
                </div>
                <span className={`px-2 py-0.5 rounded text-xs ${rolC[u.rol]}`}>{u.rol}</span>
              </div>
            </div>
          ))}
        </div>
        <div className={`p-3 border-t ${theme==='dark'?'border-gray-700':'border-gray-200'}`}>
          <button className="w-full py-2 rounded text-sm font-medium bg-violet-600 text-white hover:bg-violet-500 flex items-center justify-center gap-2"><Icon name="UserPlus" size={14}/>Yeni Kullanıcı</button>
        </div>
      </div>
      <div className={`flex-1 overflow-auto p-4 ${theme==='dark'?'bg-gray-900':'bg-white'}`}>
        {selUser?(<div className="space-y-6">
          <div className="flex items-start justify-between">
            <div className="flex items-center gap-4">
              <div className={`w-16 h-16 rounded-full flex items-center justify-center text-xl font-bold ${theme==='dark'?'bg-violet-900/30 text-violet-400':'bg-violet-100 text-violet-600'}`}>{selUser.ad.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
              <div>
                <h2 className={`text-xl font-bold ${theme==='dark'?'text-white':'text-gray-900'}`}>{selUser.ad}</h2>
                <p className={`text-sm ${theme==='dark'?'text-gray-400':'text-gray-500'}`}>{selUser.email}</p>
                <div className="flex items-center gap-2 mt-1">
                  <span className={`px-2 py-0.5 rounded text-xs ${rolC[selUser.rol]}`}>{selUser.rol}</span>
                  <span className={`px-2 py-0.5 rounded text-xs ${theme==='dark'?'bg-emerald-900/30 text-emerald-400':'bg-emerald-100 text-emerald-700'}`}>{selUser.durum}</span>
                </div>
              </div>
            </div>
            <div className="flex gap-2">
              <button className={`px-3 py-2 rounded text-sm ${theme==='dark'?'bg-gray-700 text-gray-300 hover:bg-gray-600':'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}>Şifre Sıfırla</button>
              <button className="px-3 py-2 rounded text-sm bg-violet-600 text-white hover:bg-violet-500">Düzenle</button>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-4">
            <div><label className={`text-xs ${theme==='dark'?'text-gray-500':'text-gray-400'}`}>Ad Soyad</label><input type="text" defaultValue={selUser.ad} className={`w-full mt-1 px-3 py-2 rounded border text-sm ${inp}`}/></div>
            <div><label className={`text-xs ${theme==='dark'?'text-gray-500':'text-gray-400'}`}>E-posta</label><input type="email" defaultValue={selUser.email} className={`w-full mt-1 px-3 py-2 rounded border text-sm ${inp}`}/></div>
            <div><label className={`text-xs ${theme==='dark'?'text-gray-500':'text-gray-400'}`}>Rol</label><select className={`w-full mt-1 px-3 py-2 rounded border text-sm ${inp}`} defaultValue={selUser.rol}><option>Yönetici</option><option>Avukat</option><option>Stajyer</option><option>Sekreter</option></select></div>
            <div><label className={`text-xs ${theme==='dark'?'text-gray-500':'text-gray-400'}`}>Son Giriş</label><input type="text" value={selUser.sonGiris} readOnly className={`w-full mt-1 px-3 py-2 rounded border text-sm ${theme==='dark'?'bg-gray-800 border-gray-700 text-gray-400':'bg-gray-50 border-gray-300 text-gray-500'}`}/></div>

              <thead><tr className={theme==='dark'?'text-gray-400':'text-gray-500'}>
                <th className="text-left py-2 w-1/3">Modül</th><th className="text-center py-2">Yönetici</th><th className="text-center py-2">Avukat</th><th className="text-center py-2">Stajyer</th><th className="text-center py-2">Sekreter</th>
              </tr></thead>
              <tbody>{yetkiler.map((yg,i)=>(
                <tr key={i} className={`border-t ${theme==='dark'?'border-gray-700':'border-gray-200'}`}>
                  <td className={`py-2 ${theme==='dark'?'text-gray-300':'text-gray-700'}`}>{yg.modul}</td>
                  {['y','a','s','sk'].map(r=><td key={r} className="text-center py-2"><input type="checkbox" defaultChecked={yg[r]} className="rounded"/></td>)}

          <div className="h-full flex items-center justify-center">
            <div className="text-center">
              <Icon name="Users" size={48} className={theme==='dark'?'text-gray-700':'text-gray-300'}/>

            </div>
          </div>
        )}

};

// MAIN APP
const AvukatOfisApp=()=>{
  const[theme,setTheme]=useState('light');
  const[loggedIn,setLoggedIn]=useState(false);
  const[user,setUser]=useState(null);
  const[tabs,setTabs]=useState([{id:'dashboard',label:'Ana Sayfa',icon:'LayoutDashboard',closable:false}]);
  const[activeTab,setActiveTab]=useState('dashboard');
  const[selMuv,setSelMuv]=useState(null);
  const[selDos,setSelDos]=useState(null);
  const toggleTheme=()=>setTheme(t=>t==='light'?'dark':'light');
  const openTab=(id,label,icon)=>{
    if(!tabs.find(t=>t.id===id))setTabs([...tabs,{id,label,icon,closable:true}]);
    setActiveTab(id);
  };
  const closeTab=id=>{
    if(tabs.find(t=>t.id===id)?.closable===false)return;
    const nt=tabs.filter(t=>t.id!==id);setTabs(nt);
    if(activeTab===id)setActiveTab(nt[nt.length-1]?.id||'dashboard');
  };
  const handleMenu=action=>{
    switch(action){
      case 'dashboard':openTab('dashboard','Ana Sayfa','LayoutDashboard');break;
      case 'muvekkil-liste':openTab('muvekkil-liste','Müvekkil Listesi','Users');break;
      case 'dosya-liste':openTab('dosya-liste','Dosya Listesi','FolderOpen');break;
      case 'gorev-liste':openTab('gorev-liste','Görev Listesi','CheckSquare');break;
      case 'mali-liste':openTab('mali-liste','Mali Takip','Receipt');break;
      case 'kullanici-yonetimi':openTab('kullanici-yonetimi','Kullanıcı Yönetimi','Shield');break;
      case 'logout':setLoggedIn(false);setUser(null);break;
      default:console.log('Action:',action);
    }
  };
  const openMuv=m=>{setSelMuv(m);openTab('muvekkil-'+m.id,m.ad.substring(0,20),'User')};
  const openDos=d=>{setSelDos(d);openTab('dosya-'+d.id,d.dosyaNo,'FileText')};
  useEffect(()=>{
    const h=e=>{
      if(!loggedIn)return;
      if(e.key==='F1'){e.preventDefault();handleMenu('dashboard')}
      else if(e.key==='F2'){e.preventDefault();handleMenu('muvekkil-liste')}
      else if(e.key==='F3'){e.preventDefault();handleMenu('dosya-liste')}
      else if(e.key==='F4'){e.preventDefault();handleMenu('gorev-liste')}
      else if(e.key==='F5'){e.preventDefault();handleMenu('mali-liste')}
      else if(e.key==='F9'){e.preventDefault();handleMenu('kullanici-yonetimi')}
      else if(e.key==='Escape'&&activeTab!=='dashboard')closeTab(activeTab);
    };
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[activeTab,loggedIn]);
  if(!loggedIn)return <LoginScreen onLogin={u=>{setUser(u);setLoggedIn(true)}}/>;
  const render=()=>{
    if(activeTab==='dashboard')return <DashboardScreen theme={theme} onNavigate={handleMenu}/>;
    if(activeTab==='muvekkil-liste')return <MuvekkilListeScreen theme={theme} onOpenMuvekkil={openMuv}/>;
    if(activeTab.startsWith('muvekkil-')&&activeTab!=='muvekkil-liste')return <MuvekkilKartScreen muvekkil={selMuv} theme={theme}/>;
    if(activeTab==='dosya-liste')return <DosyaListeScreen theme={theme} onOpenDosya={openDos}/>;
    if(activeTab.startsWith('dosya-')&&activeTab!=='dosya-liste')return <DosyaKartScreen dosya={selDos} theme={theme}/>;
    if(activeTab==='gorev-liste')return <GorevListeScreen theme={theme}/>;
    if(activeTab==='mali-liste')return <MaliTakipScreen theme={theme}/>;
    if(activeTab==='kullanici-yonetimi')return <KullaniciYonetimiScreen theme={theme}/>;
    return <DashboardScreen theme={theme} onNavigate={handleMenu}/>;
  };
  const bg=theme==='dark'?'bg-gray-900 text-white':'bg-white text-gray-900';
  return(
    <ThemeContext.Provider value={{theme,toggleTheme}}>
      <div className={`h-screen flex flex-col ${bg} ${theme}`}>
        <MenuBar theme={theme} onMenuAction={handleMenu}/>
        <Toolbar theme={theme} onAction={handleMenu}/>
        <TabBar tabs={tabs} activeTab={activeTab} onTabChange={setActiveTab} onTabClose={closeTab} theme={theme}/>
        <div className="flex-1 flex overflow-hidden">{render()}</div>
        <StatusBar user={user?.name||'Kullanıcı'} theme={theme} toggleTheme={toggleTheme}/>
      </div>
    </ThemeContext.Provider>
  );
};
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<AvukatOfisApp/>);
</script>
</body>
</html>
